name: CI/CD Pipeline - Build, Lint, and Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black bandit[toml]

      - name: Run Black check
        run: |
          black --check server/djangoapp server/djangoproj --diff --quiet || true
          echo "Python formatting check completed"

      - name: Run Flake8
        run: |
          flake8 server --exclude migrations,venv,__pycache__ --exit-zero
          echo "Python linting completed"

      - name: Run Bandit
        run: |
          bandit -r server/djangoapp server/djangoproj || true
          echo "Python security scan completed"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: server/frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: server/frontend
        env:
          CI: false
        run: npm run build

      - name: Syntax-check Express API files
        run: |
          find server/database -name "*.js" -not -path "*/node_modules/*" -exec node --check {} \;
          echo "JavaScript checks completed"

  docker_build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: server/frontend/package-lock.json

      - name: Build frontend assets for Django image
        working-directory: server/frontend
        env:
          CI: false
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Compose services
        run: docker compose build api_server sentiment_analyzer frontend django

  security_scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for committed environment files
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "Do not commit .env files."
            exit 1
          fi
          echo "No committed .env files found"

      - name: Check for private keys
        run: |
          if git grep -n "BEGIN .*PRIVATE KEY" -- . ':!server/frontend/package-lock.json'; then
            echo "Private key material was found in the repository."
            exit 1
          fi
          echo "No private keys found"

  test_docker_compose:
    name: Test Docker Compose Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: |
          docker compose config --quiet
          echo "Docker Compose configuration is valid"

      - name: List Docker Compose services
        run: docker compose config --services

  code_quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check file structure
        run: |
          echo "Python files: $(find server -type f -name '*.py' | wc -l)"
          echo "Node.js files: $(find server/database -type f -name '*.js' | wc -l)"
          echo "React files: $(find server/frontend/src -type f \( -name '*.jsx' -o -name '*.js' \) | wc -l)"
          test -f docker-compose.yml
          test -f server/Dockerfile.django
          test -f server/database/Dockerfile
          test -f server/frontend/Dockerfile
          echo "Project structure validated"

  notify_status:
    name: Notify Build Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint_python
      - lint_js
      - docker_build
      - security_scan
      - test_docker_compose
      - code_quality

    steps:
      - name: Summary
        run: |
          echo "=== CI/CD Pipeline Summary ==="
          echo "Python lint: ${{ needs.lint_python.result }}"
          echo "JavaScript lint/build: ${{ needs.lint_js.result }}"
          echo "Docker build: ${{ needs.docker_build.result }}"
          echo "Security scan: ${{ needs.security_scan.result }}"
          echo "Compose config: ${{ needs.test_docker_compose.result }}"
          echo "Code quality: ${{ needs.code_quality.result }}"
