services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: car_dealership_mongodb
    environment:
      MONGO_INITDB_DATABASE: dealershipsDB
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - car_dealership_network

  # Node.js API Server (for dealerships and reviews)
  api_server:
    build:
      context: ./server/database
      dockerfile: Dockerfile
    container_name: car_dealership_api
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://mongodb:27017/dealershipsDB
    ports:
      - "3030:3030"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - car_dealership_network

  # Flask Sentiment Analyzer
  sentiment_analyzer:
    build:
      context: ./server/djangoapp/microservices
      dockerfile: Dockerfile
    container_name: car_dealership_sentiment
    environment:
      FLASK_ENV: production
    ports:
      - "5050:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - car_dealership_network

  # Django Backend Server
  django:
    build:
      context: ./server
      dockerfile: Dockerfile.django
    container_name: car_dealership_django
    environment:
      DEBUG: "False"
      SECRET_KEY: "your-secret-key-change-in-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1,django"
      DATABASE_URL: "sqlite:///db.sqlite3"
      BACKEND_URL: "http://api_server:3030"
      SENTIMENT_ANALYZER_URL: "http://sentiment_analyzer:5000/"
    ports:
      - "8000:8000"
    depends_on:
      - api_server
      - sentiment_analyzer
    volumes:
      - ./server:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - car_dealership_network

  # React Frontend
  frontend:
    build:
      context: ./server/frontend
      dockerfile: Dockerfile
    container_name: car_dealership_frontend
    ports:
      - "3000:3000"
    depends_on:
      - django
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - car_dealership_network

  # Nginx Reverse Proxy (Optional but recommended for production)
  nginx:
    image: nginx:alpine
    container_name: car_dealership_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - django
      - frontend
    restart: unless-stopped
    networks:
      - car_dealership_network

volumes:
  mongodb_data:

networks:
  car_dealership_network:
    driver: bridge
